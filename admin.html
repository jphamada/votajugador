<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - Cargar Partido</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --text-muted: #718096;
      --text-light: #a0aec0;
      --border-color: #e2e8f0;
      --accent-red: #e53e3e;
      --accent-red-hover: #c53030;
      --success-green: #38a169;
      --font-serif: 'Georgia', serif;
      --font-sans: 'Inter', 'Arial', 'Helvetica', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: #f7fafc;
      color: var(--text-color);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 3rem 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .title-admin {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
    }

    .db-status {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .db-status.supabase {
      background-color: #e6fffa;
      color: #319795;
    }

    .db-status.local {
      background-color: #ebf8ff;
      color: #2b6cb0;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent-red);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .file-input-wrapper {
      position: relative;
      border: 2px dashed var(--border-color);
      padding: 1.5rem;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      background: #fafafa;
    }

    .file-input-wrapper:hover {
      border-color: var(--accent-red);
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-preview {
      margin-top: 0.75rem;
      max-height: 200px;
      max-width: 100%;
      object-fit: contain;
      display: none;
      border-radius: 4px;
    }

    /* SECCIÓN JUGADORES */
    .players-section-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      margin: 2.5rem 0 1rem;
      border-bottom: 2px solid var(--text-color);
      padding-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-entry-card {
      background: #fafafa;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .remove-player-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: none;
      color: var(--accent-red);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .remove-player-btn:hover {
      text-decoration: underline;
    }

    .player-row-fields {
      display: grid;
      grid-template-columns: 80px 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .player-row-fields {
        grid-template-columns: 1fr;
      }
    }

    .btn {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-color);
    }

    .btn:hover:not(:disabled) {
      background: #f7fafc;
      border-color: var(--text-muted);
    }

    .btn-red {
      background-color: var(--accent-red);
      color: #ffffff;
      border-color: var(--accent-red);
    }

    .btn-red:hover:not(:disabled) {
      background-color: var(--accent-red-hover);
      border-color: var(--accent-red-hover);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .actions-bar {
      margin-top: 3rem;
      border-top: 1px solid var(--border-color);
      padding-top: 2rem;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }

    /* MODAL DE RESULTADOS */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 8px;
      max-width: 550px;
      width: 90%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      color: var(--success-green);
      margin-bottom: 1rem;
    }

    .modal-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .url-box {
      background: #f7fafc;
      border: 1px solid var(--border-color);
      padding: 0.75rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      margin-bottom: 1.5rem;
      user-select: all;
    }

    /* LOADING SPINNER */
    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 2px solid #ffffff;
      width: 16px;
      height: 16px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 class="title-admin">Cargar Nuevo Partido</h1>
      <span id="db-indicator" class="db-status">Detectando...</span>
    </header>

    <form id="match-form">
      <!-- DETALLES DEL PARTIDO -->
      <div class="form-group">
        <label for="match-title">Título del Partido</label>
        <input type="text" id="match-title" placeholder="Ej: ¿Cómo jugó la Selección ante Egipto?" required>
      </div>

      <div class="form-group">
        <label for="match-summary">Copete / Sumario</label>
        <textarea id="match-summary" placeholder="Ej: Calificá el rendimiento de los jugadores argentinos en la gran victoria..." required></textarea>
      </div>

      <div class="form-group">
        <label>Foto Principal (Hero)</label>
        <div class="file-input-wrapper">
          <span class="file-label">Haz clic o arrastra un archivo de imagen aquí</span>
          <input type="file" id="match-hero-file" accept="image/*" required onchange="previewImage(this, 'hero-preview')">
          <img id="hero-preview" class="file-preview" alt="Vista previa principal">
        </div>
      </div>

      <!-- SECCIÓN JUGADORES -->
      <div class="players-section-title">
        <span>Jugadores</span>
        <button type="button" class="btn" onclick="addPlayerRow()">+ Agregar Jugador</button>
      </div>

      <div id="players-list-container">
        <!-- Las filas de jugadores se inyectan dinámicamente -->
      </div>

      <!-- BOTONES DE ACCIÓN -->
      <div class="actions-bar">
        <a href="index.html" class="btn">Volver a la portada</a>
        <button type="submit" class="btn btn-red" id="submit-btn">
          <span>Crear Partido y Votación</span>
        </button>
      </div>
    </form>
  </div>

  <!-- MODAL DE ÉXITO -->
  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <h2 class="modal-title">¡Partido Creado con Éxito!</h2>
      <p class="modal-text" style="margin-bottom: 1.5rem;">Se ha configurado la votación. Puedes compartir el enlace directo o copiar el código iframe responsive para embeberlo en tu sitio web:</p>
      
      <div style="margin-bottom: 1.5rem; text-align: left;">
        <label style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Enlace Directo</label>
        <div class="url-box" id="generated-url" style="margin-bottom: 0.5rem;">http://...</div>
        <button type="button" class="btn" style="width: 100%; justify-content: center;" onclick="copyUrl()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar Enlace Directo
        </button>
      </div>

      <div style="margin-bottom: 2rem; text-align: left;">
        <label style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Código Embebido (Iframe Responsivo)</label>
        <textarea id="generated-iframe" class="url-box" style="width: 100%; height: 90px; resize: none; margin-bottom: 0.5rem; font-family: monospace; font-size: 0.75rem; text-align: left;" readonly></textarea>
        <button type="button" class="btn" style="width: 100%; justify-content: center;" onclick="copyIframe()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar Código Iframe
        </button>
      </div>

      <div style="display: flex; gap: 0.5rem; justify-content: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <button type="button" class="btn" onclick="closeModal()">Cerrar</button>
        <a id="open-link" href="#" class="btn btn-red" target="_blank">Ir a Votar</a>
      </div>
    </div>
  </div>

  <!-- Cargar clientes y lógica -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  
  <script>
    let playerIndex = 0;

    document.addEventListener("DOMContentLoaded", () => {
      // Indicar modo de base de datos
      const indicator = document.getElementById("db-indicator");
      if (window.isSupabaseConfigured) {
        indicator.innerText = "Conectado a Supabase";
        indicator.classList.add("supabase");
      } else {
        indicator.innerText = "Modo Local Fallback (localStorage)";
        indicator.classList.add("local");
      }

      // Agregar los primeros dos jugadores por defecto
      addPlayerRow();
      addPlayerRow();

      // Enviar formulario
      const form = document.getElementById("match-form");
      form.addEventListener("submit", handleFormSubmit);
    });

    // Vista previa de carga de imágenes
    function previewImage(input, previewId) {
      const file = input.files[0];
      const preview = document.getElementById(previewId);
      
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    // Agregar fila de jugador
    function addPlayerRow() {
      playerIndex++;
      const container = document.getElementById("players-list-container");
      const card = document.createElement("div");
      card.className = "player-entry-card";
      card.id = `player-card-${playerIndex}`;

      card.innerHTML = `
        <button type="button" class="remove-player-btn" onclick="removePlayerRow(${playerIndex})">Remover</button>
        
        <div class="player-row-fields">
          <div class="form-group">
            <label>N°</label>
            <input type="text" class="player-number" placeholder="10" required>
          </div>
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" class="player-name" placeholder="Lionel Messi" required>
          </div>
          <div class="form-group">
            <label>Posición</label>
            <input type="text" class="player-position" placeholder="Delantero / Capitán" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Promedio Inicial (Base de la gente)</label>
            <input type="text" class="player-initial-avg" placeholder="7.5" value="7.0" required>
          </div>
          <div class="form-group">
            <label>Foto de Perfil</label>
            <div class="file-input-wrapper" style="padding: 0.75rem;">
              <span style="font-size: 0.8rem;">Elegir Imagen</span>
              <input type="file" class="player-file" accept="image/*" required onchange="previewImage(this, 'preview-${playerIndex}')">
              <img id="preview-${playerIndex}" class="file-preview" style="max-height: 80px;" alt="Preview">
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    }

    // Remover fila de jugador
    function removePlayerRow(id) {
      const card = document.getElementById(`player-card-${id}`);
      if (card) {
        card.remove();
      }
    }

    // Comprimir imagen usando Canvas para evitar superar límite de localStorage
    function compressImage(file, maxW = 400, maxH = 300) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxW) {
                height *= maxW / width;
                width = maxW;
              }
            } else {
              if (height > maxH) {
                width *= maxH / height;
                height = maxH;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.65)); // JPEG con compresión del 65%
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    }

    // Manejar envío de formulario
    async function handleFormSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById("submit-btn");
      submitBtn.disabled = true;
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = `<span class="spinner"></span> <span>Procesando...</span>`;

      try {
        const title = document.getElementById("match-title").value;
        const summary = document.getElementById("match-summary").value;
        const heroFile = document.getElementById("match-hero-file").files[0];

        let matchHeroPayload = heroFile;
        
        // Si estamos en local fallback, debemos comprimir a Base64
        if (!window.isSupabaseConfigured) {
          matchHeroPayload = await compressImage(heroFile, 800, 500);
        }

        // 1. Crear el partido
        const matchId = await DB.createMatch(title, summary, matchHeroPayload);

        // 2. Colectar datos de los jugadores agregados
        const playerCardElms = document.querySelectorAll(".player-entry-card");
        const playersList = [];

        for (const card of playerCardElms) {
          const number = parseInt(card.querySelector(".player-number").value, 10);
          const name = card.querySelector(".player-name").value;
          const position = card.querySelector(".player-position").value;
          const initialAvg = parseFloat(card.querySelector(".player-initial-avg").value) || 0.0;
          const fileInput = card.querySelector(".player-file");
          const file = fileInput.files[0];

          if (window.isSupabaseConfigured) {
            playersList.push({
              name,
              number,
              position,
              imageFile: file, // Objeto File real para Supabase
              initialAvg
            });
          } else {
            // Comprimir imagen a base64 para guardarla en localStorage
            const base64Img = await compressImage(file, 200, 200);
            playersList.push({
              name,
              number,
              position,
              imageUrl: base64Img, // String base64
              initialAvg
            });
          }
        }

        // 3. Insertar los jugadores
        await DB.addPlayers(matchId, playersList);

        // 4. Mostrar modal de éxito con la URL pública generada e Iframe
        const currentUrl = window.location.origin + window.location.pathname;
        const targetUrl = currentUrl.replace("admin.html", "index.html") + `?match=${matchId}`;
        
        document.getElementById("generated-url").innerText = targetUrl;
        
        // Iframe responsive code
        const iframeCode = `<div style="position: relative; padding-bottom: 110%; height: 0; overflow: hidden; max-width: 100%; border: 1px solid #e2e8f0; border-radius: 8px;">\n  <iframe src="${targetUrl}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allowtransparency="true"></iframe>\n</div>`;
        document.getElementById("generated-iframe").value = iframeCode;
        
        document.getElementById("open-link").href = targetUrl;
        
        const modal = document.getElementById("success-modal");
        modal.classList.add("active");

      } catch (err) {
        console.error(err);
        if (err.message && (err.message.includes("Bucket not found") || err.message.includes("does not exist"))) {
          alert("Error: El bucket de almacenamiento 'match-images' no existe en tu proyecto de Supabase.\n\nPara solucionarlo:\n1. Ve a tu panel de Supabase (https://supabase.com)\n2. Entra en tu proyecto y ve a la sección 'Storage' (Almacenamiento).\n3. Crea un nuevo bucket llamado exactamente 'match-images'.\n4. Asegúrate de marcarlo como 'Public' (Público) para que las fotos sean accesibles.");
        } else {
          alert("Ocurrió un error al guardar el partido:\n" + err.message);
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    }

    // Copiar URL al portapapeles
    function copyUrl() {
      const urlText = document.getElementById("generated-url").innerText;
      navigator.clipboard.writeText(urlText).then(() => {
        alert("¡Enlace copiado al portapapeles!");
      }).catch(err => {
        console.error("No se pudo copiar el enlace:", err);
      });
    }

    // Copiar código Iframe
    function copyIframe() {
      const iframeText = document.getElementById("generated-iframe").value;
      navigator.clipboard.writeText(iframeText).then(() => {
        alert("¡Código iframe copiado al portapapeles!");
      }).catch(err => {
        console.error("No se pudo copiar el iframe:", err);
      });
    }

    // Cerrar modal
    function closeModal() {
      document.getElementById("success-modal").classList.remove("active");
    }
  </script>
</body>
</html>
