<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calificá a la Selección Argentina vs Egipto</title>
  <meta name="description"
    content="Poneles puntaje a los jugadores de la Selección Argentina tras el triunfo 3-2 sobre Egipto y compará tu opinión con la del resto de los hinchas.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Supabase y Capa de Datos -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container" id="main-container">




    <!-- ENCABEZADO DINÁMICO -->
    <header>
      <h1 class="main-headline" id="match-title">Cargando partido...</h1>
      <p class="subtitle-editorial" id="match-summary"></p>
    </header>

    <!-- FOTO PRINCIPAL HERO DINÁMICA -->
    <div class="main-hero-image" id="match-hero-container" style="display: none;">
      <img id="match-hero-img" src="" alt="Imagen destacada del partido">

    </div>

    <!-- PANEL GENERAL DE CONTROL -->
    <div class="controls" id="match-controls" style="display: none;">
      <div class="stats-summary">
        <div class="stat-box">
          <span class="stat-label">Tus Calificaciones</span>
          <span class="stat-value" id="user-voted-count">0 / 0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Promedio de la Gente</span>
          <span class="stat-value red-accent" id="team-community-avg">0.0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Total de Hinchas</span>
          <span class="stat-value" id="total-voters-display">0</span>
        </div>
      </div>
      <button class="btn" id="reset-button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
        </svg>
        Reiniciar mis votos
      </button>
    </div>

    <!-- LISTADO DE JUGADORES DINÁMICO -->
    <main class="players-list" id="players-container">
      <div class="loading-state">Cargando el listado de jugadores...</div>
    </main>

    <!-- CONFIRMAR VOTACIÓN -->
    <div class="submit-votes-container" id="submit-votes-wrapper" style="display: none; text-align: center; margin: 3rem 0; border-top: 1px solid var(--border-color); padding-top: 2rem;">
      <button class="btn btn-red" id="confirm-votes-btn" style="font-size: 1.1rem; padding: 0.9rem 2.5rem; border-radius: 6px; width: 100%; max-width: 400px; justify-content: center;" disabled>
        Confirmar y Enviar mis Votos
      </button>
    </div>

  </div>

  <!-- PIE DE PÁGINA -->
  <footer>

  </footer>

  <script>
    let currentMatchId = null;
    let playersList = [];
    let userVotes = {};
    let playerStats = {};
    let tempVotes = {};

    // INICIALIZACIÓN
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentMatchId = urlParams.get('match');

      try {
        // 1. Si no hay ID en la URL, semillar partido por defecto o buscar el último
        if (!currentMatchId) {
          const seededId = await handleNoMatchParam();
          if (seededId) {
            // Recargar con el ID correcto
            window.location.search = `?match=${seededId}`;
            return;
          }
        }

        // 2. Cargar datos del partido
        await loadMatchData(currentMatchId);

        // 3. Configurar botón de reinicio
        const resetBtn = document.getElementById("reset-button");
        resetBtn.addEventListener("click", async () => {
          if (confirm("¿Estás seguro de que quieres borrar todos tus votos para este partido?")) {
            for (const p of playersList) {
              // Limpiar votos locales (en mock es directo, en Supabase se borran de la base de datos)
              if (!window.isSupabaseConfigured) {
                const votes = JSON.parse(localStorage.getItem('mock_votes')) || [];
                const userUuid = getOrCreateUserUUID();
                const filtered = votes.filter(v => !(v.player_id === p.id && v.user_uuid === userUuid));
                localStorage.setItem('mock_votes', JSON.stringify(filtered));
              } else {
                // Para Supabase, eliminamos el registro en votes de este usuario y jugador
                const userUuid = getOrCreateUserUUID();
                await window.supabaseClient.from('votes').delete().eq('player_id', p.id).eq('user_uuid', userUuid);
              }
            }
            // Recargar interfaz
            userVotes = {};
            tempVotes = {};
            await refreshStats();
            renderPlayers();
            updateGlobalStatus();
          }
        });

        // 4. Configurar botón para confirmar y enviar votaciones
        const confirmBtn = document.getElementById("confirm-votes-btn");
        confirmBtn.addEventListener("click", async () => {
          const tempKeys = Object.keys(tempVotes);
          if (tempKeys.length === 0) return;

          confirmBtn.disabled = true;
          const originalText = confirmBtn.innerText;
          confirmBtn.innerText = "Enviando votos...";

          try {
            // Guardar todos los votos temporales en paralelo
            await Promise.all(tempKeys.map(playerId => 
              DB.submitVote(playerId, tempVotes[playerId])
            ));

            // Combinar con los votos ya permanentes
            Object.assign(userVotes, tempVotes);
            tempVotes = {};

            // Refrescar estadísticas y redibujar con barras de promedio
            await refreshStats();
            renderPlayers();
            updateGlobalStatus();

            alert("¡Calificaciones enviadas correctamente!");
          } catch (err) {
            console.error(err);
            alert("Ocurrió un error al enviar tus votos:\n" + err.message);
            confirmBtn.disabled = false;
            confirmBtn.innerText = originalText;
          }
        });

      } catch (err) {
        console.error(err);
        document.getElementById("players-container").innerHTML = `
          <div class="loading-state" style="color: var(--accent-red);">
            Error al cargar el partido. Asegúrate de haber ingresado un ID de partido válido o de haber configurado tu base de datos correctamente.
          </div>
        `;
      }
    });

    // Semillar partido inicial si la base de datos o localStorage está vacía
    async function handleNoMatchParam() {
      if (window.isSupabaseConfigured) {
        // Buscar el último partido en Supabase
        const { data, error } = await window.supabaseClient
          .from('matches')
          .select('id')
          .order('created_at', { ascending: false })
          .limit(1);

        if (data && data.length > 0) {
          return data[0].id;
        } else {
          // Base de datos de Supabase vacía: sembrar partido semilla
          return await seedDefaultMatch();
        }
      } else {
        // En Local Storage
        const matches = JSON.parse(localStorage.getItem('mock_matches')) || [];
        if (matches.length > 0) {
          return matches[matches.length - 1].id; // Retorna el último
        } else {
          return await seedDefaultMatch();
        }
      }
    }

    // Semilla del partido clásico Argentina vs Egipto
    async function seedDefaultMatch() {
      const matchId = await DB.createMatch(
        "¿Cómo jugó la Selección?",
        "Calificá el rendimiento de los futbolistas argentinos en la gran victoria 3-2 sobre Egipto por la fase de grupos y compará tus puntajes con el promedio general de los lectores.",
        "images/messi.png"
      );

      const players = [
        { name: "Lionel Messi", number: 10, position: "Delantero / Capitán", imageUrl: "images/messi.png", initialAvg: 8.7 },
        { name: "Emiliano Martínez", number: 23, position: "Arquero", imageUrl: "images/dibu.png", initialAvg: 8.2 },
        { name: "Rodrigo De Paul", number: 7, position: "Mediocampista", imageUrl: "images/depaul.png", initialAvg: 6.9 },
        { name: "Lautaro Martínez", number: 22, position: "Delantero", imageUrl: "images/lautaro.png", initialAvg: 7.8 },
        { name: "Cristian Romero", number: 13, position: "Defensor Central", imageUrl: "images/romero.png", initialAvg: 7.4 }
      ];

      await DB.addPlayers(matchId, players);
      return matchId;
    }

    // CARGAR DATOS GENERALES
    async function loadMatchData(matchId) {
      // 1. Obtener detalles del partido
      const match = await DB.getMatch(matchId);
      document.getElementById("match-title").innerText = match.title;
      document.getElementById("match-summary").innerText = match.summary;

      if (match.hero_image_url) {
        const heroImg = document.getElementById("match-hero-img");
        heroImg.src = match.hero_image_url;
        document.getElementById("match-hero-container").style.display = "block";
      }

      // 2. Obtener lista de jugadores
      playersList = await DB.getPlayers(matchId);

      // 3. Obtener promedios y total de votantes
      await refreshStats();

      // 4. Obtener votos del usuario
      userVotes = await DB.getUserVotes(matchId);

      // 5. Renderizar e indicar que finalizó la carga
      renderPlayers();
      updateGlobalStatus();
      document.getElementById("match-controls").style.display = "flex";
    }

    // REFRESCO DE ESTADÍSTICAS DESDE DB/LOCALSTORAGE
    async function refreshStats() {
      playerStats = await DB.getPlayerStats(currentMatchId);
    }

    // RENDERIZADO DE LA GRILLA DE JUGADORES
    function renderPlayers() {
      const container = document.getElementById("players-container");
      container.innerHTML = "";

      if (playersList.length === 0) {
        container.innerHTML = `<div class="loading-state">Este partido aún no tiene jugadores cargados.</div>`;
        return;
      }

      playersList.forEach(player => {
        const userVote = userVotes[player.id];
        const hasVoted = userVote !== undefined;

        // Recuperar promedios reales calculados
        const stats = playerStats[player.id] || { averageRating: player.initial_avg, totalVotes: 0 };
        const calculatedAvg = stats.averageRating.toFixed(1);

        const row = document.createElement("article");
        row.className = `player-row ${hasVoted ? 'has-voted' : ''}`;
        row.id = `row-${player.id}`;

        row.innerHTML = `
          <div class="player-header">
            <div class="player-avatar-container">
              <img class="player-avatar" src="${player.image_url}" alt="Foto de ${player.name}" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="player-meta">
              <span class="player-number-role">${player.position}</span>
              <div class="player-name-container">
                <h2 class="player-name">${player.name}</h2>
                <span class="player-voted-dot" id="voted-dot-${player.id}">Votado</span>
              </div>
            </div>
          </div>
          
          <div class="player-interactive">
            <div class="rating-label">Tu Calificación:</div>
            <div class="score-buttons">
              ${Array.from({ length: 10 }, (_, i) => i + 1).map(num => {
                const isSelected = (hasVoted && userVote === num) || (!hasVoted && tempVotes[player.id] === num);
                return `
                  <button class="score-btn ${isSelected ? 'selected' : ''}" 
                          ${hasVoted ? 'disabled' : `onclick="selectTempVote('${player.id}', ${num})"`}>${num}</button>
                `;
              }).join('')}
            </div>

            <div class="comparison-section">
              <div class="bar-container">
                <div class="bar-header">
                  <span>Tu calif: <strong id="val-user-${player.id}">${userVote !== undefined ? userVote : (tempVotes[player.id] !== undefined ? tempVotes[player.id] : '-')}</strong></span>
                </div>
                <div class="bar-bg">
                  <div class="bar-fill user-voted" id="bar-user-${player.id}" style="width: ${(userVote !== undefined ? userVote : (tempVotes[player.id] !== undefined ? tempVotes[player.id] : 0)) * 10}%"></div>
                </div>
              </div>
              <div class="bar-container">
                <div class="bar-header">
                  <span>Promedio de la comunidad: <strong id="val-comm-${player.id}">${calculatedAvg}</strong></span>
                </div>
                <div class="bar-bg">
                  <div class="bar-fill community-avg" id="bar-comm-${player.id}" style="width: ${calculatedAvg * 10}%"></div>
                </div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(row);
      });
    }

    // SELECCIÓN TEMPORAL DE VOTO (EN MEMORIA)
    window.selectTempVote = function (playerId, voteValue) {
      tempVotes[playerId] = voteValue;

      // Actualizar visualmente la fila del jugador
      const row = document.getElementById(`row-${playerId}`);
      
      // 1. Actualizar botones
      const buttons = row.querySelectorAll('.score-btn');
      buttons.forEach((btn, index) => {
        if (index + 1 === voteValue) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });

      // 2. Actualizar barra y etiqueta en tiempo real
      document.getElementById(`val-user-${playerId}`).innerText = voteValue;
      document.getElementById(`bar-user-${playerId}`).style.width = `${voteValue * 10}%`;

      // 3. Actualizar contadores globales y habilitar el botón de enviar
      updateGlobalStatus();
    };

    // ACTUALIZAR ESTADÍSTICAS GLOBALES
    function updateGlobalStatus() {
      const votedKeys = Object.keys(userVotes);
      const votedCount = votedKeys.length;

      // Actualizar contadores
      document.getElementById("user-voted-count").innerText = `${votedCount} / ${playersList.length}`;
      document.getElementById("reset-button").disabled = votedCount === 0;

      // Mostrar/Ocultar y habilitar botón de enviar votos
      const confirmWrapper = document.getElementById("submit-votes-wrapper");
      if (confirmWrapper) {
        if (votedCount > 0) {
          confirmWrapper.style.display = "none";
        } else {
          confirmWrapper.style.display = "block";
          
          const confirmBtn = document.getElementById("confirm-votes-btn");
          if (confirmBtn) {
            const tempCount = Object.keys(tempVotes).length;
            confirmBtn.disabled = tempCount === 0;
            confirmBtn.innerText = `Confirmar y Enviar mis Votos (${tempCount} seleccionados)`;
          }
        }
      }

      // Obtener el total acumulado de votantes únicos
      let maxVoters = 0;
      let totalSum = 0;
      let ratedPlayersCount = 0;

      playersList.forEach(player => {
        const stats = playerStats[player.id] || { averageRating: player.initial_avg, totalVotes: 0 };
        const userHasVoted = userVotes[player.id] !== undefined;
        // Si el usuario votó y es local fallback, incrementamos de forma simulada el total
        const count = stats.totalVotes + (window.isSupabaseConfigured ? 0 : (userHasVoted ? 183 : 182));

        if (count > maxVoters) {
          maxVoters = count;
        }

        totalSum += stats.averageRating;
        ratedPlayersCount++;
      });

      document.getElementById("total-voters-display").innerText = maxVoters.toLocaleString('es-AR');

      // Promedio del equipo general de la comunidad
      const teamAvg = ratedPlayersCount > 0 ? (totalSum / ratedPlayersCount).toFixed(1) : "0.0";
      document.getElementById("team-community-avg").innerText = teamAvg;
    }
  </script>
</body>

</html>
