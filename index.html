<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calificá a la Selección Argentina vs Egipto</title>
  <meta name="description" content="Poneles puntaje a los jugadores de la Selección Argentina tras el triunfo 3-2 sobre Egipto y compará tu opinión con la del resto de los hinchas.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Supabase y Capa de Datos -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>

  <style>
    /* VARIABLES DEL SISTEMA EDITORIAL CLEAN */
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --text-muted: #718096;
      --text-light: #a0aec0;
      --border-color: #e2e8f0;
      
      --accent-red: #e53e3e;
      --accent-red-hover: #c53030;
      --bar-community: #4a5568;
      
      --font-serif: 'Georgia', serif;
      --font-sans: 'Inter', 'Arial', 'Helvetica', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      line-height: 1.8;
      padding: 0;
    }

    /* CONTENEDOR CENTRALIZADO CON MÁRGENES AMPLIO A LOS LADOS */
    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      flex-grow: 1;
    }

    /* METADATOS EDITORIALES */
    .editorial-meta {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .editorial-meta .dot {
      color: var(--text-light);
    }

    .editorial-meta .live-tag {
      color: var(--accent-red);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .editorial-meta .live-tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--accent-red);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* ENCABEZADO SERIF AUTORITARIO Y CENTRADO */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .main-headline {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text-color);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle-editorial {
      font-size: clamp(1.05rem, 1.8vw, 1.25rem);
      color: #2d3748;
      max-width: 720px;
      margin: 0 auto;
      font-weight: 400;
      line-height: 1.6;
    }

    /* IMAGEN HERO DE ALTO IMPACTO */
    .main-hero-image {
      margin-bottom: 3.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .main-hero-image img {
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    .image-caption {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      font-style: italic;
    }

    /* CONTROLES EDITORIALES FINOS */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stats-summary {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-color);
      font-family: var(--font-sans);
    }

    .stat-value.red-accent {
      color: var(--accent-red);
    }

    .btn {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-color);
    }

    .btn:hover:not(:disabled) {
      background: #f7fafc;
      border-color: var(--text-muted);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* LISTA VERTICAL DE JUGADORES */
    .players-list {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
      margin-bottom: 4rem;
    }

    /* FILA / TARJETA MINIMALISTA DE JUGADOR */
    .player-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 3rem;
    }

    .player-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    /* PERFIL DEL JUGADOR */
    .player-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .player-avatar-container {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background-color: #f7fafc;
      border: 1px solid var(--border-color);
    }

    .player-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .player-meta {
      display: flex;
      flex-direction: column;
    }

    .player-number-role {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .player-name-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .player-name {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-color);
    }

    .player-voted-dot {
      background-color: var(--accent-red);
      color: #ffffff;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      text-transform: uppercase;
      display: none;
    }

    .player-row.has-voted .player-voted-dot {
      display: inline-block;
    }

    /* SECCIÓN DE VOTACIÓN A LA DERECHA/ABAJO */
    .player-interactive {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .rating-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .score-buttons {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .score-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      width: 38px;
      height: 38px;
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .score-btn:hover {
      background: #f7fafc;
      border-color: var(--text-muted);
    }

    .score-btn.selected {
      background-color: var(--accent-red);
      color: #ffffff;
      border-color: var(--accent-red);
    }

    /* COMPARACIÓN EN LÍNEA EDITORIAL */
    .comparison-section {
      height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .player-row.has-voted .comparison-section {
      height: 90px;
      opacity: 1;
      margin-top: 0.5rem;
    }

    .bar-container {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .bar-header strong {
      color: var(--text-color);
    }

    .bar-bg {
      background: #edf2f7;
      height: 4px;
      width: 100%;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .bar-fill.user-voted {
      background-color: var(--accent-red);
    }

    .bar-fill.community-avg {
      background-color: var(--bar-community);
    }

    /* PIE DE PÁGINA */
    footer {
      text-align: center;
      padding: 3rem 1.5rem;
      border-top: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.8rem;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    footer p {
      margin-bottom: 0.25rem;
    }

    footer a {
      color: var(--accent-red);
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* MENSAJE DE ERROR/CARGA */
    .loading-state {
      text-align: center;
      padding: 4rem 1rem;
      font-size: 1.15rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="container" id="main-container">
    
    <!-- METADATOS EDITORIALES -->
    <div class="editorial-meta">
      <span>JUGÁ Y CALIFICÁ</span>
      <span class="dot">•</span>
      <span>DEPORTES</span>
      <span class="dot">•</span>
      <span class="live-tag">ACTUALIZADO EN VIVO</span>
    </div>

    <!-- ENCABEZADO DINÁMICO -->
    <header>
      <h1 class="main-headline" id="match-title">Cargando partido...</h1>
      <p class="subtitle-editorial" id="match-summary"></p>
    </header>

    <!-- FOTO PRINCIPAL HERO DINÁMICA -->
    <div class="main-hero-image" id="match-hero-container" style="display: none;">
      <img id="match-hero-img" src="" alt="Imagen destacada del partido">
      <span class="image-caption" id="match-hero-caption">Foto de Prensa / IA Mockup</span>
    </div>

    <!-- PANEL GENERAL DE CONTROL -->
    <div class="controls" id="match-controls" style="display: none;">
      <div class="stats-summary">
        <div class="stat-box">
          <span class="stat-label">Tus Calificaciones</span>
          <span class="stat-value" id="user-voted-count">0 / 0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Promedio de la Gente</span>
          <span class="stat-value red-accent" id="team-community-avg">0.0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Total de Hinchas</span>
          <span class="stat-value" id="total-voters-display">0</span>
        </div>
      </div>
      <button class="btn" id="reset-button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
        </svg>
        Reiniciar mis votos
      </button>
    </div>

    <!-- LISTADO DE JUGADORES DINÁMICO -->
    <main class="players-list" id="players-container">
      <div class="loading-state">Cargando el listado de jugadores...</div>
    </main>

  </div>

  <!-- PIE DE PÁGINA -->
  <footer>
    <p>© 2026 | Diseño Editorial Mockup</p>
  </footer>

  <script>
    let currentMatchId = null;
    let playersList = [];
    let userVotes = {};
    let playerStats = {};

    // INICIALIZACIÓN
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentMatchId = urlParams.get('match');

      try {
        // 1. Si no hay ID en la URL, semillar partido por defecto o buscar el último
        if (!currentMatchId) {
          const seededId = await handleNoMatchParam();
          if (seededId) {
            // Recargar con el ID correcto
            window.location.search = `?match=${seededId}`;
            return;
          }
        }

        // 2. Cargar datos del partido
        await loadMatchData(currentMatchId);

        // 3. Configurar botón de reinicio
        const resetBtn = document.getElementById("reset-button");
        resetBtn.addEventListener("click", async () => {
          if (confirm("¿Estás seguro de que quieres borrar todos tus votos para este partido?")) {
            for (const p of playersList) {
              // Limpiar votos locales (en mock es directo, en Supabase se borran de la base de datos)
              if (!window.isSupabaseConfigured) {
                const votes = JSON.parse(localStorage.getItem('mock_votes')) || [];
                const userUuid = getOrCreateUserUUID();
                const filtered = votes.filter(v => !(v.player_id === p.id && v.user_uuid === userUuid));
                localStorage.setItem('mock_votes', JSON.stringify(filtered));
              } else {
                // Para Supabase, eliminamos el registro en votes de este usuario y jugador
                const userUuid = getOrCreateUserUUID();
                await window.supabaseClient.from('votes').delete().eq('player_id', p.id).eq('user_uuid', userUuid);
              }
            }
            // Recargar interfaz
            userVotes = {};
            await refreshStats();
            renderPlayers();
            updateGlobalStatus();
          }
        });

      } catch (err) {
        console.error(err);
        document.getElementById("players-container").innerHTML = `
          <div class="loading-state" style="color: var(--accent-red);">
            Error al cargar el partido. Asegúrate de haber ingresado un ID de partido válido o de haber configurado tu base de datos correctamente.
          </div>
        `;
      }
    });

    // Semillar partido inicial si la base de datos o localStorage está vacía
    async function handleNoMatchParam() {
      if (window.isSupabaseConfigured) {
        // Buscar el último partido en Supabase
        const { data, error } = await window.supabaseClient
          .from('matches')
          .select('id')
          .order('created_at', { ascending: false })
          .limit(1);
        
        if (data && data.length > 0) {
          return data[0].id;
        } else {
          // Base de datos de Supabase vacía: sembrar partido semilla
          return await seedDefaultMatch();
        }
      } else {
        // En Local Storage
        const matches = JSON.parse(localStorage.getItem('mock_matches')) || [];
        if (matches.length > 0) {
          return matches[matches.length - 1].id; // Retorna el último
        } else {
          return await seedDefaultMatch();
        }
      }
    }

    // Semilla del partido clásico Argentina vs Egipto
    async function seedDefaultMatch() {
      const matchId = await DB.createMatch(
        "¿Cómo jugó la Selección?",
        "Calificá el rendimiento de los futbolistas argentinos en la gran victoria 3-2 sobre Egipto por la fase de grupos y compará tus puntajes con el promedio general de los lectores.",
        "images/messi.png"
      );

      const players = [
        { name: "Lionel Messi", number: 10, position: "Delantero / Capitán", imageUrl: "images/messi.png", initialAvg: 8.7 },
        { name: "Emiliano Martínez", number: 23, position: "Arquero", imageUrl: "images/dibu.png", initialAvg: 8.2 },
        { name: "Rodrigo De Paul", number: 7, position: "Mediocampista", imageUrl: "images/depaul.png", initialAvg: 6.9 },
        { name: "Lautaro Martínez", number: 22, position: "Delantero", imageUrl: "images/lautaro.png", initialAvg: 7.8 },
        { name: "Cristian Romero", number: 13, position: "Defensor Central", imageUrl: "images/romero.png", initialAvg: 7.4 }
      ];

      await DB.addPlayers(matchId, players);
      return matchId;
    }

    // CARGAR DATOS GENERALES
    async function loadMatchData(matchId) {
      // 1. Obtener detalles del partido
      const match = await DB.getMatch(matchId);
      document.getElementById("match-title").innerText = match.title;
      document.getElementById("match-summary").innerText = match.summary;
      
      if (match.hero_image_url) {
        const heroImg = document.getElementById("match-hero-img");
        heroImg.src = match.hero_image_url;
        document.getElementById("match-hero-container").style.display = "block";
      }

      // 2. Obtener lista de jugadores
      playersList = await DB.getPlayers(matchId);

      // 3. Obtener promedios y total de votantes
      await refreshStats();

      // 4. Obtener votos del usuario
      userVotes = await DB.getUserVotes(matchId);

      // 5. Renderizar e indicar que finalizó la carga
      renderPlayers();
      updateGlobalStatus();
      document.getElementById("match-controls").style.display = "flex";
    }

    // REFRESCO DE ESTADÍSTICAS DESDE DB/LOCALSTORAGE
    async function refreshStats() {
      playerStats = await DB.getPlayerStats(currentMatchId);
    }

    // RENDERIZADO DE LA GRILLA DE JUGADORES
    function renderPlayers() {
      const container = document.getElementById("players-container");
      container.innerHTML = "";

      if (playersList.length === 0) {
        container.innerHTML = `<div class="loading-state">Este partido aún no tiene jugadores cargados.</div>`;
        return;
      }

      playersList.forEach(player => {
        const userVote = userVotes[player.id];
        const hasVoted = userVote !== undefined;

        // Recuperar promedios reales calculados
        const stats = playerStats[player.id] || { averageRating: player.initial_avg, totalVotes: 0 };
        const calculatedAvg = stats.averageRating.toFixed(1);

        const row = document.createElement("article");
        row.className = `player-row ${hasVoted ? 'has-voted' : ''}`;
        row.id = `row-${player.id}`;

        row.innerHTML = `
          <div class="player-header">
            <div class="player-avatar-container">
              <img class="player-avatar" src="${player.image_url}" alt="Foto de ${player.name}" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="player-meta">
              <span class="player-number-role">N°${player.number} • ${player.position}</span>
              <div class="player-name-container">
                <h2 class="player-name">${player.name}</h2>
                <span class="player-voted-dot" id="voted-dot-${player.id}">Votado</span>
              </div>
            </div>
          </div>
          
          <div class="player-interactive">
            <div class="rating-label">Tu Calificación:</div>
            <div class="score-buttons">
              ${Array.from({ length: 10 }, (_, i) => i + 1).map(num => `
                <button class="score-btn ${userVote === num ? 'selected' : ''}" 
                        onclick="registerVote('${player.id}', ${num})">${num}</button>
              `).join('')}
            </div>

            <div class="comparison-section">
              <div class="bar-container">
                <div class="bar-header">
                  <span>Tu calif: <strong id="val-user-${player.id}">${userVote || '-'}</strong></span>
                </div>
                <div class="bar-bg">
                  <div class="bar-fill user-voted" id="bar-user-${player.id}" style="width: ${hasVoted ? userVote * 10 : 0}%"></div>
                </div>
              </div>
              <div class="bar-container">
                <div class="bar-header">
                  <span>Promedio de la comunidad: <strong id="val-comm-${player.id}">${calculatedAvg}</strong></span>
                </div>
                <div class="bar-bg">
                  <div class="bar-fill community-avg" id="bar-comm-${player.id}" style="width: ${hasVoted ? calculatedAvg * 10 : 0}%"></div>
                </div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(row);
      });
    }

    // REGISTRO DE VOTO INDIVIDUAL
    window.registerVote = async function (playerId, voteValue) {
      try {
        // Enviar voto a la base de datos o localstorage
        await DB.submitVote(playerId, voteValue);
        userVotes[playerId] = voteValue;

        // Refrescar y recalcular estadísticas
        await refreshStats();
        
        const stats = playerStats[playerId] || { averageRating: voteValue, totalVotes: 1 };
        const calculatedAvg = stats.averageRating.toFixed(1);

        // Actualizar fila del jugador en caliente
        const row = document.getElementById(`row-${playerId}`);
        row.classList.add('has-voted');

        // Actualizar botones de puntaje
        const buttons = row.querySelectorAll('.score-btn');
        buttons.forEach((btn, index) => {
          if (index + 1 === voteValue) {
            btn.classList.add('selected');
          } else {
            btn.classList.remove('selected');
          }
        });

        // Actualizar etiquetas y barras comparativas
        document.getElementById(`voted-dot-${playerId}`).style.display = 'inline-block';
        document.getElementById(`val-user-${playerId}`).innerText = voteValue;
        document.getElementById(`val-comm-${playerId}`).innerText = calculatedAvg;

        // Animar barras
        setTimeout(() => {
          document.getElementById(`bar-user-${playerId}`).style.width = `${voteValue * 10}%`;
          document.getElementById(`bar-comm-${playerId}`).style.width = `${calculatedAvg * 10}%`;
        }, 50);

        // Actualizar conteos globales
        updateGlobalStatus();

      } catch (err) {
        console.error(err);
        alert("Ocurrió un error al procesar tu voto: " + err.message);
      }
    };

    // ACTUALIZAR ESTADÍSTICAS GLOBALES
    function updateGlobalStatus() {
      const votedKeys = Object.keys(userVotes);
      const votedCount = votedKeys.length;

      // Actualizar contadores
      document.getElementById("user-voted-count").innerText = `${votedCount} / ${playersList.length}`;
      document.getElementById("reset-button").disabled = votedCount === 0;

      // Obtener el total acumulado de votantes únicos (aproximado usando el máximo totalVotes de cualquiera de los jugadores)
      let maxVoters = 0;
      let totalSum = 0;
      let ratedPlayersCount = 0;

      playersList.forEach(player => {
        const stats = playerStats[player.id] || { averageRating: player.initial_avg, totalVotes: 0 };
        // Si el usuario votó y es local fallback, incrementamos de forma simulada el total
        const count = stats.totalVotes + (window.isSupabaseConfigured ? 0 : (userVotes[player.id] !== undefined ? 183 : 182));
        
        if (count > maxVoters) {
          maxVoters = count;
        }

        totalSum += stats.averageRating;
        ratedPlayersCount++;
      });

      document.getElementById("total-voters-display").innerText = maxVoters.toLocaleString('es-AR');

      // Promedio del equipo general de la comunidad
      const teamAvg = ratedPlayersCount > 0 ? (totalSum / ratedPlayersCount).toFixed(1) : "0.0";
      document.getElementById("team-community-avg").innerText = teamAvg;
    }
  </script>
</body>
</html>
